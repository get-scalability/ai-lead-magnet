x-api-dev: &app-dev
  build:
    context: ./
    dockerfile: ./Dockerfile
    target: app-dev
  image: get-scalability/ai-lead-magnet/app-dev
  stdin_open: true
  tty: true
  volumes:
    - ./:/app/
    - ~/.ipython/:/home/web/.ipython/

x-app-ci: &app-ci
  <<: *app-dev
  env_file:
    - path: .env.template

x-admin-dev: &admin-dev
  build:
    context: ./admin
    target: dev
  image: get-scalability/ai-lead-magnet/admin-dev
  volumes:
    - ./admin:/app

x-admin-ci: &admin-ci
  image: get-scalability/ai-lead-magnet/admin-dev
  volumes:
    - ./admin:/app

services:
  admin:
    <<: *admin-dev
    environment:
      API_PROXY_TARGET: http://api:8000
    ports:
      - "${ADMIN_PORT:-9601}:5173"
    depends_on:
      - api
    profiles:
      - ""

  api:
    <<: *app-dev
    restart: always
    command: >-
      uvicorn app.api_main:app --reload --host 0.0.0.0
      --reload-dir app
      --reload-include '*.md'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-9602}:8000"
    profiles:
      - ""

  ci-app-alembic-check:
    <<: *app-ci
    command:
      - /bin/sh
      - -c
      - alembic upgrade head && alembic check
    profiles:
      - "ci"

  ci-app-pytest:
    <<: *app-ci
    command:
      - /bin/sh
      - -c
      - |
        pytest --cov --cov-report=xml
        r=$$?
        echo -e "## Coverage summary\n" > coverage.md
        coverage report --format=markdown --skip-covered >> coverage.md
        exit $$r
    profiles:
      - "ci"

  ci-app-ruff-check:
    <<: *app-ci
    command: ruff check --no-cache
    profiles:
      - "ci"

  ci-app-ruff-format:
    <<: *app-ci
    command: ruff format --check --no-cache
    profiles:
      - "ci"

  ci-app-uv-lock-check:
    <<: *app-ci
    command: uv lock --check
    profiles:
      - "ci"

  ci-admin-tsc:
    <<: *admin-ci
    command: ["bunx", "--bun", "tsc", "-b"]
    profiles:
      - "ci"

  ci-admin-eslint:
    <<: *admin-ci
    command: ["bun", "run", "lint"]
    profiles:
      - "ci"

  gotenberg:
    image: gotenberg/gotenberg:8
    profiles:
      - ""

  postgres:
    command: -c 'max_connections=500'
    environment:
      POSTGRES_DB: ai_lead_magnet
      POSTGRES_PASSWORD: scala_password
      POSTGRES_USER: scala_user
    healthcheck:
      test: pg_isready -U scala_user -d ai_lead_magnet
      interval: 3s
      timeout: 3s
      retries: 5
    image: postgres:18.3-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    profiles:
      - ""
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

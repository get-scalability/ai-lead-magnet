name: Build

on:
  workflow_call:
    inputs:
      draft:
        type: boolean
        default: false

env:
  LOCAL_IMAGE_PREFIX: "${{ github.repository }}"

jobs:
  app-build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Cache
        uses: actions/cache@v5
        id: cache
        with:
          path: |
            root-cache-uv-arm64
            var-cache-apk-arm64
          key: build-cache-${{ hashFiles('Dockerfile', 'uv.lock') }}
      - name: Inject cache into Docker
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          cache-map: |
            {
              "root-cache-uv-arm64": { "target": "/root/.cache/uv", "id": "uv-arm64" },
              "var-cache-apk-arm64": { "target": "/var/cache/apk", "id": "apk-arm64" }
            }
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}
      - name: Create Bake file
        run: |
          if [ "${{ inputs.draft }}" = "true" ]; then
            TARGETS='["bake-app-dev", "bake-admin-dev"]'
          else
            TARGETS='["bake-app-dev", "bake-app-dist", "bake-admin-dev", "bake-admin-dist"]'
          fi

          cat <<EOF > docker-bake.hcl

          group "default" {
            targets = ${TARGETS}
          }

          target "bake-app-dev" {
            cache-from = ["type=gha"]
            cache-to = ["type=gha,mode=max"]
            context = "."
            dockerfile = "Dockerfile"
            output = ["type=docker,dest=/tmp/app-dev.tar"]
            platforms = ["linux/arm64"]
            pull = true
            tags = ["${{ env.LOCAL_IMAGE_PREFIX }}/app-dev:latest"]
            target = "app-dev"
          }

          target "bake-app-dist" {
            cache-from = ["type=gha"]
            cache-to = ["type=gha,mode=max"]
            context = "."
            dockerfile = "Dockerfile"
            output = ["type=docker,dest=/tmp/app-dist.tar"]
            platforms = ["linux/arm64"]
            pull = true
            tags = ["${{ env.LOCAL_IMAGE_PREFIX }}/app-dist:latest"]
            target = "app-dist"
          }

          target "bake-admin-dev" {
            cache-from = ["type=gha"]
            cache-to = ["type=gha,mode=max"]
            context = "./admin"
            dockerfile = "Dockerfile"
            output = ["type=docker,dest=/tmp/admin-dev.tar"]
            platforms = ["linux/arm64"]
            pull = true
            tags = ["${{ env.LOCAL_IMAGE_PREFIX }}/admin-dev:latest"]
            target = "dev"
          }

          target "bake-admin-dist" {
            cache-from = ["type=gha"]
            cache-to = ["type=gha,mode=max"]
            context = "./admin"
            dockerfile = "Dockerfile"
            output = ["type=docker,dest=/tmp/admin-dist.tar"]
            platforms = ["linux/arm64"]
            pull = true
            tags = ["${{ env.LOCAL_IMAGE_PREFIX }}/admin-dist:latest"]
            target = "dist"
          }

          EOF
      - name: Build images
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          source: .
      - name: Upload app-dev-image artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-dev-image
          path: /tmp/app-dev.tar
      - name: Upload app-dist-image artifact
        if: ${{ !inputs.draft }}
        uses: actions/upload-artifact@v7
        with:
          name: app-dist-image
          path: /tmp/app-dist.tar
      - name: Upload admin-dev-image artifact
        uses: actions/upload-artifact@v7
        with:
          name: admin-dev-image
          path: /tmp/admin-dev.tar
      - name: Upload admin-dist-image artifact
        if: ${{ !inputs.draft }}
        uses: actions/upload-artifact@v7
        with:
          name: admin-dist-image
          path: /tmp/admin-dist.tar

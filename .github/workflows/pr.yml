name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      draft: ${{ github.event.pull_request.draft }}
  ci:
    uses: ./.github/workflows/_ci.yml
    needs: build
    with:
      draft: ${{ github.event.pull_request.draft }}
